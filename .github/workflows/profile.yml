name: VectorChord-bm25 Profiling

permissions:
  contents: read

env:
  VECTORCHORD_BM25_VERSION: "0.3.0"
  PG_TOKENIZER_VERSION: "0.1.1"

on:
  workflow_dispatch:
    inputs:
      msmarco_size:
        description: 'MS MARCO subset size (passages)'
        required: false
        default: 'full'
        type: choice
        options:
          - '100K'
          - '500K'
          - '1M'
          - 'full'

jobs:
  profile-vectorchord-bm25:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL /usr/share/swift
        df -h /

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates build-essential bc unzip \
            linux-tools-common linux-tools-generic linux-tools-$(uname -r) || true
        # Install FlameGraph for visualization
        git clone --depth 1 https://github.com/brendangregg/FlameGraph.git

        # PostgreSQL
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo apt-key add -
        echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-17 postgresql-server-dev-17 \
            postgresql-17-dbgsym || sudo apt-get install -y postgresql-17 postgresql-server-dev-17

        # Install vectorchord-bm25 + pg_tokenizer from GitHub releases
        # ubuntu-latest is Ubuntu 24.04 (Noble)
        wget -q "https://github.com/tensorchord/VectorChord-bm25/releases/download/${VECTORCHORD_BM25_VERSION}/postgresql-17-vchord-bm25_${VECTORCHORD_BM25_VERSION}-1_amd64.deb"
        sudo dpkg -i "postgresql-17-vchord-bm25_${VECTORCHORD_BM25_VERSION}-1_amd64.deb"
        wget -q "https://github.com/tensorchord/pg_tokenizer.rs/releases/download/${PG_TOKENIZER_VERSION}/postgresql-17-pg-tokenizer_${PG_TOKENIZER_VERSION}-1_amd64.deb"
        sudo dpkg -i "postgresql-17-pg-tokenizer_${PG_TOKENIZER_VERSION}-1_amd64.deb"

    - name: Configure PostgreSQL
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        rm -rf tmp_bench
        mkdir -p tmp_bench/socket
        initdb -D tmp_bench/data --auth-local=trust --auth-host=trust

        NCPUS=$(nproc)
        cat >> tmp_bench/data/postgresql.conf << EOF
        unix_socket_directories = '$PWD/tmp_bench/socket'
        shared_buffers = 4GB
        effective_cache_size = 12GB
        maintenance_work_mem = 512MB
        work_mem = 128MB
        max_connections = 20
        checkpoint_completion_target = 0.9
        wal_buffers = 64MB
        random_page_cost = 1.1
        effective_io_concurrency = 200
        max_parallel_maintenance_workers = $NCPUS
        max_parallel_workers_per_gather = $NCPUS
        max_parallel_workers = $NCPUS
        shared_preload_libraries = 'pg_tokenizer'
        search_path = 'public, pg_catalog, bm25_catalog, tokenizer_catalog'
        bm25_catalog.bm25_limit = 10
        EOF

        if ! pg_ctl start -D tmp_bench/data -l tmp_bench/postgres.log -w; then
          echo "PostgreSQL failed to start. Log:"
          cat tmp_bench/postgres.log
          exit 1
        fi
        export PGHOST="$PWD/tmp_bench/socket"
        createdb bench_test
        psql -d bench_test -c "CREATE EXTENSION pg_tokenizer CASCADE"
        psql -d bench_test -c "CREATE EXTENSION vchord_bm25 CASCADE"
        echo "PGHOST=$PWD/tmp_bench/socket" >> $GITHUB_ENV

    - name: Download MS MARCO dataset
      run: |
        cd benchmarks/datasets/msmarco
        chmod +x download.sh
        ./download.sh ${{ github.event.inputs.msmarco_size }}

    - name: Load data (without index)
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        export PGDATABASE=bench_test
        export DATA_DIR="$PWD/benchmarks/datasets/msmarco/data"

        # Load data using the standard load script, but stop before index creation
        awk 'BEGIN{p=1} /^-- Create BM25 index/{p=0} p{print}' \
          benchmarks/datasets/msmarco/vectorchord-bm25/load.sql > /tmp/load_data_only.sql
        psql -f /tmp/load_data_only.sql
        psql -c "SELECT COUNT(*) as num_rows FROM msmarco_passages"

    - name: Profile index creation with perf
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        export PGDATABASE=bench_test

        # Enable perf for non-root (may fail on some systems)
        echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid || true
        echo 0 | sudo tee /proc/sys/kernel/kptr_restrict || true

        # Profile tokenizer creation + embedding materialization (single perf)
        psql -v ON_ERROR_STOP=1 -c "SELECT create_tokenizer('bert', \$\$ model = \"bert_base_uncased\" \$\$); UPDATE msmarco_passages SET embedding = tokenize(passage_text, 'bert');" &
        PSQL_PID=$!
        sleep 2
        PG_PID=$(pgrep -f "postgres.*bench_test" | head -1)
        echo "Profiling tokenizer+embedding PID: $PG_PID"
        if [ -n "$PG_PID" ]; then
          sudo perf record -F 99 -p $PG_PID -g --call-graph dwarf -o tokenize_embed_perf.data -- sleep 3600 &
          PERF_PID=$!
          wait $PSQL_PID || true
          sudo kill -INT $PERF_PID 2>/dev/null || true
          sleep 2
          sudo perf report -i tokenize_embed_perf.data --stdio --no-children > tokenize_embed_profile.txt 2>&1 || true
          sudo perf script -i tokenize_embed_perf.data > tokenize_embed_perf.script 2>/dev/null || true
          if [ -s tokenize_embed_perf.script ]; then
            ./FlameGraph/stackcollapse-perf.pl tokenize_embed_perf.script > tokenize_embed_perf.folded
            ./FlameGraph/flamegraph.pl --title "Tokenizer+Embedding CPU Profile" tokenize_embed_perf.folded > tokenize_embed_flamegraph.svg
            echo "Tokenizer+Embedding flamegraph generated successfully"
          fi
        else
          wait $PSQL_PID || true
        fi

        # Start index creation in background
        psql -c "CREATE INDEX msmarco_bm25_idx ON msmarco_passages USING bm25 (embedding bm25_ops);" &
        PSQL_PID=$!

        # Wait a moment for the backend to start
        sleep 2

        # Find the postgres backend process
        PG_PID=$(pgrep -f "postgres.*bench_test" | head -1)
        echo "Profiling PID: $PG_PID"

        if [ -n "$PG_PID" ]; then
          # Record profile for duration of index build (up to 60 min for full dataset)
          sudo perf record -F 99 -p $PG_PID -g --call-graph dwarf -o perf.data -- sleep 3600 &
          PERF_PID=$!

          # Wait for index creation to complete
          wait $PSQL_PID || true

          # Stop perf recording
          sudo kill -INT $PERF_PID 2>/dev/null || true
          sleep 2

          # Generate perf report for indexing
          sudo perf report -i perf.data --stdio --no-children > index_profile.txt 2>&1 || true

          # Generate flamegraph for indexing
          sudo perf script -i perf.data > perf.script 2>/dev/null || true
          if [ -s perf.script ]; then
            ./FlameGraph/stackcollapse-perf.pl perf.script > index_perf.folded
            ./FlameGraph/flamegraph.pl --title "Index Build CPU Profile" index_perf.folded > index_flamegraph.svg
            echo "Index flamegraph generated successfully"
          fi
        else
          echo "Could not find postgres backend PID"
          wait $PSQL_PID || true
        fi

    - name: Profile queries with perf (tokenize)
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        export PGDATABASE=bench_test

        # Disable autovacuum to avoid profiling vacuum instead of queries
        psql -c "ALTER SYSTEM SET autovacuum = off"
        pg_ctl reload -D tmp_bench/data

        # Create a query script that runs many iterations for profiling
        cat > /tmp/profile_queries_tokenize.sql << 'EOSQL'
        \timing off
        DO $$
        DECLARE
          i INT;
          dummy RECORD;
        BEGIN
          -- Part 1: Queries WITHOUT scores (index scan)
          FOR i IN 1..3000 LOOP
            FOR dummy IN
              SELECT ctid FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('search engine', 'bert')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('machine learning algorithms', 'bert')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('what is the best way to learn programming', 'bert')) LIMIT 10
            LOOP END LOOP;
          END LOOP;

          -- Part 2: Queries WITH scores (per-row operator call)
          FOR i IN 1..3000 LOOP
            FOR dummy IN
              SELECT ctid,
                     embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('search engine', 'bert')) as score
              FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('search engine', 'bert')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid,
                     embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('machine learning algorithms', 'bert')) as score
              FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('machine learning algorithms', 'bert')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid,
                     embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('what is the best way to learn programming', 'bert')) as score
              FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', tokenize('what is the best way to learn programming', 'bert')) LIMIT 10
            LOOP END LOOP;
          END LOOP;
        END $$;
        EOSQL

        # Start queries in background
        psql -f /tmp/profile_queries_tokenize.sql &
        PSQL_PID=$!

        # Wait for backend to start, then find it
        sleep 2
        PG_PID=$(ps aux | grep "postgres:.*bench_test" | grep -v "autovacuum\|checkpointer\|walwriter\|bgwriter\|logical\|startup" | grep -v grep | awk '{print $2}' | head -1)
        echo "Profiling query backend PID: $PG_PID"

        if [ -n "$PG_PID" ]; then
          # Record profile for query duration (up to 10 min)
          sudo perf record -F 499 -p $PG_PID -g --call-graph dwarf -o query_perf_tokenize.data -- sleep 600 &
          PERF_PID=$!

          # Wait for queries to complete
          wait $PSQL_PID || true

          # Stop perf recording
          sudo kill -INT $PERF_PID 2>/dev/null || true
          sleep 2

          # Generate perf report for queries
          sudo perf report -i query_perf_tokenize.data --stdio --no-children > query_profile_tokenize.txt 2>&1 || true

          # Generate flamegraph for queries
          sudo perf script -i query_perf_tokenize.data > query_perf_tokenize.script 2>/dev/null || true
          if [ -s query_perf_tokenize.script ]; then
            ./FlameGraph/stackcollapse-perf.pl query_perf_tokenize.script > query_perf_tokenize.folded
            ./FlameGraph/flamegraph.pl --title "Query CPU Profile (tokenize)" query_perf_tokenize.folded > query_flamegraph_tokenize.svg
            echo "Query flamegraph generated successfully"
          fi
        else
          echo "Could not find postgres backend PID for queries"
          wait $PSQL_PID || true
        fi

    - name: Profile queries with perf (pre-tokenized)
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        export PGDATABASE=bench_test

        # Create a query script that pre-tokenizes and reuses embeddings
        cat > /tmp/profile_queries_premb.sql << 'EOSQL'
        \timing off
        DROP TABLE IF EXISTS profile_queries_premb;
        CREATE TEMP TABLE profile_queries_premb (
          query_text TEXT,
          query_embedding bm25vector
        );
        INSERT INTO profile_queries_premb(query_text, query_embedding) VALUES
          ('search engine', tokenize('search engine', 'bert')),
          ('machine learning algorithms', tokenize('machine learning algorithms', 'bert')),
          ('what is the best way to learn programming', tokenize('what is the best way to learn programming', 'bert'));

        DO $$
        DECLARE
          i INT;
          dummy RECORD;
        BEGIN
          -- Part 1: Queries WITHOUT scores (index scan)
          FOR i IN 1..3000 LOOP
            FOR dummy IN
              SELECT ctid FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'search engine')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'machine learning algorithms')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'what is the best way to learn programming')) LIMIT 10
            LOOP END LOOP;
          END LOOP;

          -- Part 2: Queries WITH scores (per-row operator call)
          FOR i IN 1..3000 LOOP
            FOR dummy IN
              SELECT ctid,
                     embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'search engine')) as score
              FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'search engine')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid,
                     embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'machine learning algorithms')) as score
              FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'machine learning algorithms')) LIMIT 10
            LOOP END LOOP;

            FOR dummy IN
              SELECT ctid,
                     embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'what is the best way to learn programming')) as score
              FROM msmarco_passages
              ORDER BY embedding <&> to_bm25query('msmarco_bm25_idx', (SELECT query_embedding FROM profile_queries_premb WHERE query_text = 'what is the best way to learn programming')) LIMIT 10
            LOOP END LOOP;
          END LOOP;
        END $$;
        EOSQL

        # Start queries in background
        psql -f /tmp/profile_queries_premb.sql &
        PSQL_PID=$!

        # Wait for backend to start, then find it
        sleep 2
        PG_PID=$(ps aux | grep "postgres:.*bench_test" | grep -v "autovacuum\|checkpointer\|walwriter\|bgwriter\|logical\|startup" | grep -v grep | awk '{print $2}' | head -1)
        echo "Profiling query backend PID: $PG_PID"

        if [ -n "$PG_PID" ]; then
          # Record profile for query duration (up to 10 min)
          sudo perf record -F 499 -p $PG_PID -g --call-graph dwarf -o query_perf_premb.data -- sleep 600 &
          PERF_PID=$!

          # Wait for queries to complete
          wait $PSQL_PID || true

          # Stop perf recording
          sudo kill -INT $PERF_PID 2>/dev/null || true
          sleep 2

          # Generate perf report for queries
          sudo perf report -i query_perf_premb.data --stdio --no-children > query_profile_premb.txt 2>&1 || true

          # Generate flamegraph for queries
          sudo perf script -i query_perf_premb.data > query_perf_premb.script 2>/dev/null || true
          if [ -s query_perf_premb.script ]; then
            ./FlameGraph/stackcollapse-perf.pl query_perf_premb.script > query_perf_premb.folded
            ./FlameGraph/flamegraph.pl --title "Query CPU Profile (pre-tokenized)" query_perf_premb.folded > query_flamegraph_premb.svg
            echo "Query flamegraph generated successfully"
          fi
        else
          echo "Could not find postgres backend PID for queries"
          wait $PSQL_PID || true
        fi

        # Re-enable autovacuum
        psql -c "ALTER SYSTEM RESET autovacuum"
        pg_ctl reload -D tmp_bench/data

    - name: Generate profile summary
      run: |
        echo "# CPU Profile Summary" > profile_summary.md
        echo "" >> profile_summary.md
        echo "**Date:** $(date -u)" >> profile_summary.md
        echo "**Commit:** ${{ github.sha }}" >> profile_summary.md
        echo "**Branch:** ${{ github.ref_name }}" >> profile_summary.md
        echo "**Dataset:** MS MARCO ${{ github.event.inputs.msmarco_size }}" >> profile_summary.md
        echo "" >> profile_summary.md

        echo "## Index Build Profile" >> profile_summary.md
        if [ -f index_profile.txt ]; then
          echo '```' >> profile_summary.md
          head -80 index_profile.txt >> profile_summary.md
          echo '```' >> profile_summary.md
        else
          echo "Index profiling failed" >> profile_summary.md
        fi

        echo "" >> profile_summary.md
        echo "## Tokenizer + Embedding Profile" >> profile_summary.md
        if [ -f tokenize_embed_profile.txt ]; then
          echo '```' >> profile_summary.md
          head -80 tokenize_embed_profile.txt >> profile_summary.md
          echo '```' >> profile_summary.md
        else
          echo "Tokenizer+Embedding profiling failed" >> profile_summary.md
        fi

        echo "" >> profile_summary.md
        echo "## Query Profile (tokenize)" >> profile_summary.md
        if [ -f query_profile_tokenize.txt ]; then
          echo '```' >> profile_summary.md
          head -80 query_profile_tokenize.txt >> profile_summary.md
          echo '```' >> profile_summary.md
        else
          echo "Query profiling failed (tokenize)" >> profile_summary.md
        fi

        echo "" >> profile_summary.md
        echo "## Query Profile (pre-tokenized)" >> profile_summary.md
        if [ -f query_profile_premb.txt ]; then
          echo '```' >> profile_summary.md
          head -80 query_profile_premb.txt >> profile_summary.md
          echo '```' >> profile_summary.md
        else
          echo "Query profiling failed (pre-tokenized)" >> profile_summary.md
        fi

        echo "" >> profile_summary.md
        echo "## Artifacts" >> profile_summary.md
        echo "- index_flamegraph.svg - Index build CPU flamegraph" >> profile_summary.md
        echo "- tokenize_embed_flamegraph.svg - Tokenizer+Embedding CPU flamegraph" >> profile_summary.md
        echo "- query_flamegraph_tokenize.svg - Query execution CPU flamegraph (tokenize)" >> profile_summary.md
        echo "- query_flamegraph_premb.svg - Query execution CPU flamegraph (pre-tokenized)" >> profile_summary.md
        echo "- index_profile.txt - Index build perf report" >> profile_summary.md
        echo "- tokenize_embed_profile.txt - Tokenizer+Embedding perf report" >> profile_summary.md
        echo "- query_profile_tokenize.txt - Query execution perf report (tokenize)" >> profile_summary.md
        echo "- query_profile_premb.txt - Query execution perf report (pre-tokenized)" >> profile_summary.md

    - name: Upload profile artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cpu-profile-vectorchord-bm25-${{ github.run_id }}
        path: |
          index_flamegraph.svg
          tokenize_embed_flamegraph.svg
          query_flamegraph_tokenize.svg
          query_flamegraph_premb.svg
          index_profile.txt
          tokenize_embed_profile.txt
          query_profile_tokenize.txt
          query_profile_premb.txt
          profile_summary.md
          index_perf.folded
          tokenize_embed_perf.folded
          query_perf_tokenize.folded
          query_perf_premb.folded
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        pg_ctl stop -D tmp_bench/data || true
        rm -rf tmp_bench
